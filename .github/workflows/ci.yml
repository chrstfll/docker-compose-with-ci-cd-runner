name: Pipeline CI/CD Aegira & CreditApp (Fully Parallel Version)

on:
  push:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: BUILD & TEST FRONTEND
  # ==========================================
  build-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      # Setup Node & Lint/Test Frontend
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install & Test Frontend
        run: |
          cd creditappdemo2
          npm ci
          npm run lint || echo "Linter script tidak ditemukan, aman skip."
          npm run setup:e2e
          npm run test:e2e

  # ==========================================
  # JOB 2: BUILD & TEST BACKEND
  # ==========================================
  build-test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Setup Java & Test Backend
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # Cache maven packages agar cepat
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run Backend Unit Tests
        run: |
          cd aegira-loan-service
          mvn test

  # ==========================================
  # JOB 3: PUSH FRONTEND IMAGE (Hanya jalan jika FE lulus tes)
  # ==========================================
  push-frontend:
    needs: build-test-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./creditappdemo2
          file: ./creditappdemo2/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/creditappdemo2:latest

  # ==========================================
  # JOB 4: PUSH BACKEND IMAGE (Hanya jalan jika BE lulus tes)
  # ==========================================
  push-backend:
    needs: build-test-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./aegira-loan-service
          file: ./aegira-loan-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/aegira-loan-service:latest

  # ==========================================
  # JOB 5: PULL & DEPLOY (Menunggu Kedua Jalur Push Sukses)
  # ==========================================
  deploy:
    needs: [push-frontend, push-backend]
    runs-on: [self-hosted, docker-local]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Pull masing-masing image terbaru dari Docker Hub
      - name: Pull Latest Images from Docker Hub
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/creditappdemo2:latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/aegira-loan-service:latest

      # Bersihkan konflik kontainer lama
      - name: Bersihkan Kontainer Aplikasi Lama yang Menggantung
        run: |
          docker stop aegira-redis-container aegira-postgres-container || true
          docker rm aegira-redis-container aegira-postgres-container || true

      # Jalankan ulang kontainer aplikasi utama Anda secara bersih
      - name: Deploy / Restart Containers di Laptop Local
        run: |
          docker compose up -d --force-recreate creditapp-ui aegira-loan-backend aegira-db aegira-cache