name: Pipeline Multi-Job Aegira & CreditApp

on:
  push:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: HELLO (Ucapin Salam)
  # ==========================================
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: Ucapin salam
        run: echo "Halo, ini pipeline otomatisasi Aegira & CreditApp!"
      - name: Cek waktu sekarang
        run: date

  # ==========================================
  # JOB 2: LINT (Pengecekan Kode)
  # ==========================================
  lint:
    needs: hello
    runs-on: ubuntu-latest
    steps:
      # Mengoptimalkan checkout agar lebih ringan dan mencegah error 128
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1 # ← Hanya ambil commit terakhir agar tidak berat saat kloning
      
      # Frontend Linting
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install Frontend Deps
        run: |
          cd creditappdemo2
          npm ci
      - name: Run Frontend Linter
        run: |
          cd creditappdemo2
          npm run lint || echo "Linter script tidak ditemukan, aman skip."

  # ==========================================
  # JOB 3: TEST (Baru jalan setelah LINT sukses)
  # ==========================================
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 1. Jalankan Unit Test Backend (Java/Maven)
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Run Backend Unit Tests
        run: |
          cd aegira-loan-service
          mvn test # ← PERBAIKAN DI SINI: Diubah dari ./mvnw test menjadi mvn test

      # 2. Jalankan E2E Test Frontend (Playwright)
      - name: Install Frontend Playwright Browsers
        run: |
          cd creditappdemo2
          npm ci
          npm run setup:e2e
      - name: Run Frontend E2E Tests
        run: |
          cd creditappdemo2
          npm run test:e2e

  # ==========================================
  # JOB 4: BUILD & AUTOMATIC DEPLOY (Pake Runner Lokal)
  # ==========================================
  build-image:
    needs: test
    runs-on: [self-hosted, docker-local]
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 1. Build menggunakan Docker Compose untuk memperbarui image lokal
      - name: Build Docker Images via Compose
        run: |
          docker compose build

      # 2. NAH, TAMBAHKAN BARIS INI UNTUK LANGSUNG DEPLOY OTOMATIS!
      - name: Deploy / Restart Containers di Laptop Local
        run: |
          docker compose up -d --force-recreate --remove-orphans

      # ====================================================================
      # Catatan: Langkah 'docker save' & 'upload-artifact' di bawah ini
      # sekarang opsional (bisa dihapus/tetap dibiarkan buat cadangan di GitHub)
      # ====================================================================
      - name: Save Images as Artifacts
        run: |
          docker save 3-docker-compose-with-app-creditapp-ui:latest -o frontend-image.tar
          docker save 3-docker-compose-with-app-aegira-loan-backend:latest -o backend-image.tar

      # Upload hasil tar ke GitHub Artifacts
      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-docker-image
          path: frontend-image.tar

      # Upload Backend Artifact
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-docker-image
          path: backend-image.tar