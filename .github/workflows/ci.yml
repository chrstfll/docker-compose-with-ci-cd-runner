name: Pipeline CI/CD Aegira & CreditApp (Separated Build Version)

on:
  push:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: BUILD & TEST (Kombinasi Lint + Test)
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      # 1. Setup Node & Lint/Test Frontend
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install & Test Frontend
        run: |
          cd creditappdemo2
          npm ci
          npm run lint || echo "Linter script tidak ditemukan, aman skip."
          npm run setup:e2e
          npm run test:e2e

      # 2. Setup Java & Test Backend
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run Backend Unit Tests
        run: |
          cd aegira-loan-service
          mvn test

  # ==========================================
  # JOB 2: PUSH IMAGES (Dipisah FE & BE)
  # ==========================================
  push-images:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- 1. BUILD & PUSH FRONTEND SECARA TERPISAH ---
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./creditappdemo2
          file: ./creditappdemo2/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/creditappdemo2:latest

      # --- 2. BUILD & PUSH BACKEND SECARA TERPISAH ---
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./aegira-loan-service
          file: ./aegira-loan-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/aegira-loan-service:latest

  # ==========================================
  # JOB 3: PULL & DEPLOY (Pake Runner Lokal)
  # ==========================================
  deploy:
    needs: push-images
    runs-on: [self-hosted, docker-local]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # --- 1. PULL MASING-MASING IMAGE DARI REGISTRY ---
      - name: Pull Latest Images from Docker Hub
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/creditappdemo2:latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/aegira-loan-service:latest

      # --- 2. CLEARING CONTAINER CONFLICTS ---
      - name: Bersihkan Kontainer Aplikasi Lama yang Menggantung
        run: |
          docker stop aegira-redis-container aegira-postgres-container || true
          docker rm aegira-redis-container aegira-postgres-container || true

      # --- 3. DEPLOY DENGAN KONDISI BARU ---
      - name: Deploy / Restart Containers di Laptop Local
        run: |
          docker compose up -d --force-recreate creditapp-ui aegira-loan-backend aegira-db aegira-cache